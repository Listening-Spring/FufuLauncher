name: .NET Core Desktop

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Install Visual C++ Build Tools 14 (MSVC v143)
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: 17.8
        msbuild-architecture: x64
        install-vc-build-tools: true

    - name: Build FufuLauncher
      run: dotnet build FufuLauncher\FufuLauncher.csproj -c ${{ matrix.configuration }} /p:Platform="x64"

    - name: Checkout FufuLauncher.UnlockerIsland
      uses: actions/checkout@v4
      with:
        repository: FufuLauncher/FufuLauncher.UnlockerIsland
        path: FufuLauncher.UnlockerIsland_Repo

    - name: Build FufuLauncher.UnlockerIsland
      run: msbuild FufuLauncher.UnlockerIsland_Repo\FufuLauncher.UnlockerIsland\FufuLauncher.UnlockerIsland.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v145

    - name: Copy DLL to FufuLauncher
      shell: pwsh
      run: |
        $baseOutputDir = "FufuLauncher\bin\x64\Release\net8.0-windows10.0.26100.0"
        $pluginOutputDir = "$baseOutputDir\Plugins\FuFuPlugin"

        New-Item -ItemType Directory -Force -Path $pluginOutputDir | Out-Null

        $unlockerDll = Get-ChildItem -Path "FufuLauncher.UnlockerIsland_Repo" -Filter "FufuLauncher.UnlockerIsland.dll" -Recurse | Where-Object { $_.FullName -match "x64" -and $_.FullName -match "Release" } | Select-Object -First 1

        if ($unlockerDll) {
            Copy-Item -Path $unlockerDll.FullName -Destination "$pluginOutputDir\FufuLauncher.UnlockerIsland.dll" -Force
        } else {
            Write-Error "未能定位到FufuLauncher.UnlockerIsland.dll编译产物"
            exit 1
        }

    - name: Publish UpdateFufuLauncher (Single File)
      run: |
        dotnet publish UpdateFufuLauncher\UpdateFufuLauncher.csproj -c ${{ matrix.configuration }} /p:Platform="x64" -f net8.0-windows -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:DeleteExistingFiles=true -o PublishOutput

    - name: Move UpdateFufuLauncher to FufuLauncher build directory
      shell: pwsh
      run: |
        $fufuOutputDir = Get-ChildItem -Path "FufuLauncher\bin" -Recurse -Directory | Where-Object { $_.FullName -match "${{ matrix.configuration }}" -and $_.FullName -match "net8.0-windows" } | Select-Object -First 1
        
        if ($fufuOutputDir) {
            Copy-Item -Path "PublishOutput\*" -Destination $fufuOutputDir.FullName -Force -Recurse
            Write-Host "已将UpdateFufuLauncher的发布产物移动至$($fufuOutputDir.FullName)"
        } else {
            Write-Error "未能定位到FufuLauncher的构建输出目录"
            exit 1
        }

    - name: Collect PE files for signing
      shell: pwsh
      run: |
        $outputDir = "FufuLauncher\bin\x64\Release\net8.0-windows10.0.26100.0"
        $signDir = "pe-files-to-sign"
        New-Item -ItemType Directory -Force -Path $signDir | Out-Null
        Get-ChildItem -Path $outputDir -Include *.exe,*.dll -Recurse | ForEach-Object {
            $relativePath = $_.FullName.Substring((Resolve-Path $outputDir).Path.Length + 1)
            $destPath = Join-Path $signDir $relativePath
            $destDir = Split-Path $destPath -Parent
            if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Force -Path $destDir | Out-Null }
            Copy-Item $_.FullName -Destination $destPath -Force
        }
        Write-Host "Collected $((Get-ChildItem -Path $signDir -Include *.exe,*.dll -Recurse).Count) PE files for signing"

    - name: Upload PE files for signing
      id: upload-pe-files
      uses: actions/upload-artifact@v4
      with:
        name: pe-files-unsigned
        path: pe-files-to-sign\**

    - name: Sign PE files with SignPath
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '73c13632-948a-4aa1-b946-5d9760dd50e5'
        project-slug: 'FufuLauncher'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'pe-files'
        github-artifact-id: '${{ steps.upload-pe-files.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: 'signed-pe-files'

    - name: Replace build output with signed PE files
      shell: pwsh
      run: |
        $outputDir = "FufuLauncher\bin\x64\Release\net8.0-windows10.0.26100.0"
        Get-ChildItem -Path "signed-pe-files" -Include *.exe,*.dll -Recurse | ForEach-Object {
            $relativePath = $_.FullName.Substring((Resolve-Path "signed-pe-files").Path.Length + 1)
            $destPath = Join-Path $outputDir $relativePath
            Copy-Item $_.FullName -Destination $destPath -Force
            Write-Host "Replaced: $relativePath"
        }

    - name: Regenerate hash.txt for signed files
      shell: pwsh
      run: |
        $outputDir = "FufuLauncher\bin\x64\Release\net8.0-windows10.0.26100.0"
        $hashFile = Join-Path $outputDir "Assets\Launcher\hash.txt"
        $captureApp = Join-Path $outputDir "CaptureApp.exe"
        $launcher = Join-Path $outputDir "Launcher.dll"
        $existingLines = Get-Content $hashFile
        $line1 = $existingLines[0]
        $line2 = (Get-FileHash $captureApp -Algorithm SHA512).Hash.ToLower()
        $line3 = (Get-FileHash $launcher -Algorithm SHA512).Hash.ToLower()
        Set-Content -Path $hashFile -Value @($line1, $line2, $line3)
        Write-Host "Updated hash.txt with signed file hashes"

    - name: Compile Inno Setup Script
      run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" FufuLauncher.Installer\setup.iss'

    - name: Get Executable Name
      shell: pwsh
      run: |
        $exeFile = Get-ChildItem -Path "FufuLauncher.Installer\installer" -Filter "*.exe" | Select-Object -First 1
        if ($exeFile) {
            Write-Output "EXE_NAME=$($exeFile.BaseName)" >> $env:GITHUB_ENV
            Write-Output "### Build Successful" >> $env:GITHUB_STEP_SUMMARY
            Write-Output "Generated Installer: **$($exeFile.Name)**" >> $env:GITHUB_STEP_SUMMARY
            Write-Host "$($exeFile.BaseName)"
        } else {
            Write-Error "目录下未找到已打包的exe文件"
            exit 1
        }

    - name: Upload Installer Artifact
      id: upload-unsigned-installer
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.EXE_NAME }}
        path: FufuLauncher.Installer\installer\*.exe

    - name: Sign Installer with SignPath
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '73c13632-948a-4aa1-b946-5d9760dd50e5'
        project-slug: 'FufuLauncher'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'installer'
        github-artifact-id: '${{ steps.upload-unsigned-installer.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: 'signed-output'

    - name: Upload Signed Installer
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.EXE_NAME }}-signed
        path: signed-output\*.exe

    - name: Package FuFuPlugin
      shell: pwsh
      run: |
        $pluginDir = "FufuLauncher\bin\x64\Release\net8.0-windows10.0.26100.0\Plugins\FuFuPlugin"
        $stagingDir = "PluginStaging"
        New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
        
        Compress-Archive -Path "$pluginDir\*" -DestinationPath "$stagingDir\FuFuPlugin.zip" -Force
        Copy-Item -Path "$stagingDir\FuFuPlugin.zip" -Destination "$stagingDir\FuFuPlugin-old.zip" -Force
        Copy-Item -Path "$stagingDir\FuFuPlugin.zip" -Destination "$stagingDir\FuFuPlugin.vmp.zip" -Force
        Copy-Item -Path "$stagingDir\FuFuPlugin.zip" -Destination "$stagingDir\FuFuPlugin.vmp2.zip" -Force
        
        Compress-Archive -Path "$stagingDir\*.zip" -DestinationPath "FuFuPlugin_Bundle.zip" -Force

    - name: Upload FuFuPlugin Bundle
      uses: actions/upload-artifact@v4
      with:
        name: FuFuPlugin-Bundle
        path: FuFuPlugin_Bundle.zip
